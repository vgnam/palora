# @package _global_
comment: multimnist config
defaults:
- _self_
- hydra_cfg
- /data: multimnist
- method: palora
- wandb: wandb
- ray_sampler: annealing

model:
  encoder: MultiLeNetR
  decoder: MultiLeNetO

optimizer:
  _target_: torch.optim.Adam
  name: Adam
  lr: 0.001
training:
  epochs: 100


# only used for the experiment on resuming
resume_dir: "logs/multimnist/ls/2023-12-28/09-30-04/"

validate_every_n: 1
seed: 0
device: 0
hydra:
  searchpath:
  - file://configs/general
